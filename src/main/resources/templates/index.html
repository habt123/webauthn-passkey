<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDO2 Passkey POC</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); padding: 48px; text-align: center; max-width: 420px; width: 100%; }
        h1 { font-size: 24px; color: #1a1a1a; margin-bottom: 8px; }
        p { color: #666; margin-bottom: 32px; font-size: 14px; }
        .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; margin-bottom: 12px; transition: background 0.2s; }
        .btn-primary { background: #0066ff; color: #fff; }
        .btn-primary:hover { background: #0052cc; }
        .btn-secondary { background: #e8e8e8; color: #333; }
        .btn-secondary:hover { background: #ddd; }
        .icon { font-size: 48px; margin-bottom: 16px; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">🔐</div>
    <h1>FIDO2 Passkey POC</h1>
    <p>Register a passkey or sign in with an existing one.</p>
    <a href="/register" class="btn btn-primary">Register</a>
    <a href="/login" class="btn btn-secondary">Sign In</a>
</div>
</body>
</html>
