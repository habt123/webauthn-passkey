<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — FIDO2 POC</title>
    <script src="/js/webauthn.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); padding: 40px; max-width: 440px; width: 100%; }
        h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 24px; text-align: center; }
        label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 4px; margin-top: 16px; }
        input[type="text"] { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        input[type="text"]:focus { outline: none; border-color: #0066ff; box-shadow: 0 0 0 3px rgba(0,102,255,0.1); }
        .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 20px; transition: background 0.2s; }
        .btn-primary { background: #0066ff; color: #fff; }
        .btn-primary:hover { background: #0052cc; }
        .btn-success { background: #00a854; color: #fff; }
        .btn-success:hover { background: #008c46; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .message { margin-top: 16px; padding: 12px; border-radius: 6px; font-size: 13px; text-align: center; display: none; }
        .message.success { display: block; background: #e6f9ee; color: #00703c; }
        .message.error { display: block; background: #fde8e8; color: #c00; }
        .step { display: none; }
        .step.active { display: block; }
        .back { display: inline-block; margin-top: 16px; color: #0066ff; text-decoration: none; font-size: 13px; text-align: center; width: 100%; }
        .unsupported { display: none; background: #fff3cd; color: #856404; padding: 12px; border-radius: 6px; text-align: center; font-size: 13px; margin-top: 16px; }
    </style>
</head>
<body>
<div class="card">
    <h1>Register a Passkey</h1>

    <div id="unsupported" class="unsupported">
        Your browser does not support WebAuthn. Please use a modern browser.
    </div>

    <div id="step1" class="step active">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="e.g. jdoe" autocomplete="username webauthn">
        <label for="displayName">Display Name</label>
        <input type="text" id="displayName" placeholder="e.g. John Doe">
        <button id="registerUserBtn" class="btn btn-primary" onclick="doRegisterUser()">Register User</button>
    </div>

    <div id="step2" class="step">
        <p style="color:#444; font-size:14px; text-align:center; margin-bottom:8px;">
            User <strong id="registeredUsername"></strong> created.
        </p>
        <button id="registerPasskeyBtn" class="btn btn-success" onclick="doRegisterPasskey()">Register Passkey</button>
    </div>

    <div id="statusMessage" class="message"></div>

    <a href="/" class="back">&larr; Back to Home</a>
</div>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        if (!window.webauthn.detectBrowserSupport()) {
            document.getElementById('unsupported').style.display = 'block';
            document.getElementById('step1').classList.remove('active');
        }
    });

    var currentUsername = '';

    function showMessage(text, isError) {
        var el = document.getElementById('statusMessage');
        el.textContent = text;
        el.className = 'message ' + (isError ? 'error' : 'success');
    }

    function clearMessage() {
        var el = document.getElementById('statusMessage');
        el.className = 'message';
        el.textContent = '';
    }

    async function doRegisterUser() {
        clearMessage();
        var username = document.getElementById('username').value.trim();
        var displayName = document.getElementById('displayName').value.trim();
        if (!username || !displayName) {
            showMessage('Please fill in both fields.', true);
            return;
        }
        try {
            var resp = await fetch('/api/register/user', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: username, displayName: displayName})
            });
            var data = await resp.json();
            if (!resp.ok) {
                showMessage(data.errorMessage || 'Registration failed', true);
                return;
            }
            currentUsername = username;
            document.getElementById('registeredUsername').textContent = username;
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
            showMessage('User created. Now register a passkey.', false);
        } catch (e) {
            showMessage(e.message, true);
        }
    }

    async function doRegisterPasskey() {
        clearMessage();
        try {
            var result = await window.webauthn.registerPasskey(currentUsername);
            showMessage('Passkey registered successfully! You can now sign in.', false);
            document.getElementById('registerPasskeyBtn').disabled = true;
        } catch (e) {
            showMessage(e.message, true);
        }
    }
</script>
</body>
</html>
