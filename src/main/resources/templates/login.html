<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — FIDO2 POC</title>
    <script src="/js/webauthn.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); padding: 40px; max-width: 440px; width: 100%; text-align: center; }
        h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 24px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 4px; text-align: left; }
        input[type="text"] { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; margin-bottom: 8px; }
        input[type="text"]:focus { outline: none; border-color: #0066ff; box-shadow: 0 0 0 3px rgba(0,102,255,0.1); }
        .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 16px; transition: background 0.2s; }
        .btn-primary { background: #0066ff; color: #fff; }
        .btn-primary:hover { background: #0052cc; }
        .message { margin-top: 16px; padding: 12px; border-radius: 6px; font-size: 13px; display: none; }
        .message.success { display: block; background: #e6f9ee; color: #00703c; }
        .message.error { display: block; background: #fde8e8; color: #c00; }
        .hint { color: #999; font-size: 12px; margin-bottom: 16px; }
        .back { display: inline-block; margin-top: 16px; color: #0066ff; text-decoration: none; font-size: 13px; }
        .unsupported { display: none; background: #fff3cd; color: #856404; padding: 12px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
        .icon { font-size: 48px; margin-bottom: 12px; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">🔑</div>
    <h1>Sign In with Passkey</h1>

    <div id="unsupported" class="unsupported">
        Your browser does not support WebAuthn. Please use a modern browser.
    </div>

    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter your username" autocomplete="username webauthn">
    <p class="hint">Enter your username to sign in with your registered passkey.</p>

    <button id="signInBtn" class="btn btn-primary" onclick="doLogin()">Sign In</button>

    <div id="statusMessage" class="message"></div>

    <a href="/" class="back">&larr; Back to Home</a>
</div>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        if (!window.webauthn.detectBrowserSupport()) {
            document.getElementById('unsupported').style.display = 'block';
            document.getElementById('signInBtn').disabled = true;
        }
    });

    function showMessage(text, isError) {
        var el = document.getElementById('statusMessage');
        el.textContent = text;
        el.className = 'message ' + (isError ? 'error' : 'success');
    }

    async function doLogin() {
        var el = document.getElementById('statusMessage');
        el.className = 'message';
        el.textContent = '';

        var username = document.getElementById('username').value.trim();
        if (!username) {
            showMessage('Please enter your username.', true);
            return;
        }

        try {
            var result = await window.webauthn.loginPasskey(username);
            showMessage('Signed in as ' + result.username + '!', false);
        } catch (e) {
            showMessage(e.message, true);
        }
    }
</script>
</body>
</html>
