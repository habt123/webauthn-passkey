server.port=8080

spring.application.name=webauthn-passkey
spring.datasource.url=jdbc:h2:mem:fido2poc
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# WebAuthn relying party configuration
webauthn.rp.id=${WEBAUTHN_RP_ID:localhost}
webauthn.rp.name=Passkey POC
webauthn.rp.origin=${WEBAUTHN_RP_ORIGIN:http://localhost:8080}
