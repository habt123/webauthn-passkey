server.port=8080

spring.application.name=webauthn-passkey
spring.datasource.url=jdbc:h2:mem:fido2poc
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# WebAuthn relying party configuration
webauthn.rp.id=${WEBAUTHN_RP_ID:localhost}
webauthn.rp.name=Passkey POC
webauthn.rp.origin=${WEBAUTHN_RP_ORIGIN:http://localhost:8080}

# Well-known association documents for passkey-enabled native apps.
# Production associated domain: https://webauthn-passkey-production.up.railway.app/
webauthn.aasa.apps=${WEBAUTHN_AASA_APPS:handle_all_urls.omnissa.FIDOSecureEnclave}
webauthn.assetlinks.package=${WEBAUTHN_ANDROID_PACKAGE:com.omnissa.FIDOSecureEnclave}
webauthn.assetlinks.sha256=${WEBAUTHN_ANDROID_SHA256:e1dfb3d2c9a9f6812be28b2e17313e09c0a1260e95489e9b34f18310e4d3f84c}

